name: GitHub Pages

on:
  push:
  #  branches:
  #    - master
  #pull_request:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    concurrency:
      group: cicd-docs
    steps:
      - name: Checkout Git submodules
        uses: actions/checkout@v3
        with:
          submodules: true
          fetch-depth: 0

      - name: Build LDoc documentation
        uses: lunarmodules/ldoc@v1.5.0
        with:
          args: lua/socket/bindings.lua lua/socket/wrapper.lua

      - name: Listing files
        run: |
          ls -la doc

